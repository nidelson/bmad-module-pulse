name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Verify golden snapshots match templates
        run: |
          diff -q skills/bmad-pulse-setup/assets/customize-templates/bmad-dev-story.toml \
                  tests/fixtures/golden/customize-bmad-dev-story.toml
          diff -q skills/bmad-pulse-setup/assets/customize-templates/bmad-code-review.toml \
                  tests/fixtures/golden/customize-bmad-code-review.toml
